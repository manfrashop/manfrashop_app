<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Fond principal -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0F1F3D"/>
    </linearGradient>
    <!-- Dégradé icône principale -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <!-- Dégradé accent doré -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- Dégradé texte principal -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <!-- Glow bleu -->
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow subtil icône -->
    <filter id="glowIcon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Ombre douce -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Clip arrondi pour l'icône -->
    <clipPath id="iconClip">
      <rect x="20" y="20" width="120" height="120" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Fond global -->
  <rect width="480" height="160" fill="url(#bg)" rx="16"/>

  <!-- Ligne décorative top subtile -->
  <rect x="0" y="0" width="480" height="2" rx="1" fill="url(#goldGrad)" opacity="0.6"/>

  <!-- ══════════════ BLOC ICÔNE ══════════════ -->
  <!-- Fond icône avec dégradé -->
  <rect x="20" y="20" width="120" height="120" rx="22" fill="url(#iconGrad)" filter="url(#glowIcon)"/>

  <!-- Bordure fine icône -->
  <rect x="20" y="20" width="120" height="120" rx="22" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>

  <!-- Ligne dorée gauche icône -->
  <rect x="20" y="44" width="3" height="72" rx="1.5" fill="url(#goldGrad)" opacity="0.9"/>

  <!-- Lettre M stylisée -->
  <g filter="url(#shadow)">
    <!-- M principal -->
    <path d="M48 108 L48 60 L80 90 L112 60 L112 108" 
          fill="none" stroke="#F1F5F9" stroke-width="7" 
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Accent doré sous le M -->
    <line x1="48" y1="113" x2="112" y2="113" 
          stroke="url(#goldGrad)" stroke-width="2.5" 
          stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Points décoratifs coins icône -->
  <circle cx="32" cy="32" r="2" fill="#FBBF24" opacity="0.6"/>
  <circle cx="128" cy="32" r="2" fill="#FBBF24" opacity="0.6"/>
  <circle cx="128" cy="128" r="2" fill="#FBBF24" opacity="0.6"/>
  <circle cx="32" cy="128" r="2" fill="#FBBF24" opacity="0.6"/>

  <!-- ══════════════ TEXTE PRINCIPAL ══════════════ -->
  <!-- MANFRA-SHOP -->
  <text x="164" y="76" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="34" 
        font-weight="700"
        letter-spacing="4"
        fill="url(#textGrad)"
        filter="url(#shadow)">MANFRA-SHOP</text>

  <!-- Ligne séparatrice fine dorée -->
  <rect x="164" y="88" width="290" height="1.5" rx="1" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- Sous-titre HABATECH -->
  <text x="166" y="112" 
        font-family="'Courier New', Courier, monospace" 
        font-size="13" 
        font-weight="400"
        letter-spacing="8"
        fill="#64748B">HABATECH</text>

  <!-- Tagline -->
  <text x="166" y="133" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="11" 
        font-style="italic"
        letter-spacing="1.5"
        fill="#475569">Solution de gestion commerciale</text>

  <!-- ══════════════ ÉLÉMENTS DÉCORATIFS ══════════════ -->
  <!-- Losange décoratif entre les deux blocs de texte -->
  <polygon points="153,80 157,76 161,80 157,84" fill="#FBBF24" opacity="0.5"/>

  <!-- Petit accent bleu haut droite -->
  <rect x="442" y="20" width="18" height="3" rx="1.5" fill="#3B82F6" opacity="0.6"/>
  <rect x="448" y="27" width="12" height="2" rx="1" fill="#3B82F6" opacity="0.4"/>

  <!-- Petit accent bas droite -->
  <rect x="442" y="137" width="18" height="2" rx="1" fill="url(#goldGrad)" opacity="0.5"/>

  <!-- Ligne verticale décorative droite -->
  <rect x="462" y="35" width="1.5" height="90" rx="1" fill="#1E3A5F" opacity="0.8"/>

  <!-- Ligne verticale séparatrice entre icône et texte -->
  <rect x="153" y="28" width="1" height="104" rx="0.5" fill="#1E3A5F" opacity="0.6"/>
</svg>
